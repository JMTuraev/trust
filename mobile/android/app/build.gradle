plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

// Release imzo kaliti — android/key.properties dan o'qiladi (u gitignore'da, maxfiy).
// Fayl bo'lmasa (lokal dev) release build debug kalitiga tushadi.
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "uz.trust.trust_mobile"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_11
        targetCompatibility = JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_11
    }

    defaultConfig {
        applicationId = "uz.trust.trust_mobile"
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName

        // Faqat arm64-v8a: bu Windows'da uch-ABI parallel AOT (gen_snapshot) crashini
        // chetlab o'tadi VA "yarim" armeabi-v7a/x86_64 split'lari (Flutter engine'siz)
        // qurilmada crash berishining oldini oladi. Play Store faqat 64-bit qurilmaga
        // yuboradi; 32-bit (armeabi-v7a) qurilmalar "nomos" ko'radi, crash EMAS.
        ndk {
            abiFilters 'arm64-v8a'
        }
    }

    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                keyAlias = keystoreProperties['keyAlias']
                keyPassword = keystoreProperties['keyPassword']
                storeFile = keystoreProperties['storeFile'] ? rootProject.file(keystoreProperties['storeFile']) : null
                storePassword = keystoreProperties['storePassword']
            }
        }
    }

    buildTypes {
        release {
            // key.properties bor bo'lsa — release kalit bilan imzolanadi (Play Store'ga tayyor).
            // Bo'lmasa (lokal dev) debug kalitiga tushadi.
            signingConfig = keystorePropertiesFile.exists() ? signingConfigs.release : signingConfigs.debug
        }
    }

    // MUHIM: defaultConfig.ndk.abiFilters plugin AAR'laridagi prebuilt jniLibs'ni (libdartjni,
    // libdatastore_shared_counter) cheklamaydi — natijada armeabi-v7a/x86_64 "yarim" split'lar
    // (Flutter engine'siz) qoladi va o'sha qurilmalarda crash beradi. Bu yerda paketlash
    // bosqichida arm64-dan boshqa BARCHA ABI native kutubxonalarini chiqarib tashlaymiz.
    packagingOptions {
        jniLibs {
            excludes += ['**/armeabi-v7a/**', '**/armeabi/**', '**/x86/**', '**/x86_64/**', '**/mips/**', '**/mips64/**']
        }
    }
}

flutter {
    source = "../.."
}
