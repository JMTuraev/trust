name: trust_mobile
description: "Trust — ishonchli hisob-kitob. UI prototip bilan 1:1 (prototype/template.html)."
publish_to: "none"
version: 1.1.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  shared_preferences: ^2.2.3
  http: ^1.2.1
  record: ^6.1.0
  path_provider: ^2.1.3
  flutter_secure_storage: ^9.2.2
  crypto: ^3.0.3

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

# Brendlangan launcher ikoni (default Flutter beige o'rniga) — "T" logo, ilova splashiga mos.
# Generatsiya: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#111111"
  adaptive_icon_foreground: "assets/icon/icon_fg.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
