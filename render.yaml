# Render.com blueprint — https://render.com/docs/blueprint-spec
# Deploy: Render Dashboard -> New -> Blueprint -> shu repo'ni tanlang.
services:
  - type: web
    name: trust-backend
    runtime: node
    region: frankfurt # O'zbekistonga eng yaqin region
    plan: starter # uxlamaydi (cold start yo'q), real foydalanuvchilar uchun
    buildCommand: npm ci --omit=dev
    startCommand: node src/index.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false # qiymatlar Dashboard'da qo'lda kiritiladi (maxfiy)
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: APP_JWT_SECRET
        generateValue: true # Render o'zi kuchli qiymat yaratadi
      - key: DEVSMS_TOKEN
        sync: false
      - key: SMS_SERVICE_NAME
        value: AllClubs
      - key: SMS_TEMPLATE_TYPE
        value: "4"
      - key: OTP_TTL_SECONDS
        value: "300"
      - key: OTP_MAX_ATTEMPTS
        value: "5"
      # SMS toll-fraud: butun servis bo'yicha soatlik OTP capi (devsms balansini himoya)
      - key: SMS_GLOBAL_HOURLY_CAP
        value: "200"
      # STT (ovoz->matn) VAQTINCHA O'CHIQ — matn-birinchi rejim (2026-07-15).
      # Qayta yoqish: "true". LLM parsing bunga bog'liq EMAS, ishlayveradi.
      - key: STT_ENABLED
        value: "false"
      # STT (ovoz->matn) VA LLM parsing (matn->xarajat/qarz) — bitta Groq kaliti.
      # Majburiy: Xarajat AI shu kalitsiz faqat qoida-parserga tushadi.
      - key: GROQ_API_KEY
        sync: false
      # Zaxira LLM/STT (tavsiya) — Groq yiqilganda ishlatiladi
      - key: OPENAI_API_KEY
        sync: false
      # LLM modellari (ixtiyoriy — defaultlari kodda bor)
      - key: GROQ_LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: OPENAI_LLM_MODEL
        value: gpt-4o-mini
      # Link modeli sozlamalari (ixtiyoriy — defaultlari kodda bor)
      - key: REJECT_SIGNAL_DELAY_HOURS
        value: "24"
      - key: PARTNER_DAILY_LIMIT
        value: "20"
      - key: REJECT_FLAG_COUNT
        value: "3"
      - key: REJECT_FLAG_WINDOW_HOURS
        value: "72"
